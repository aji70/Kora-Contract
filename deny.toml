# Kora Protocol Dependency Audit Configuration
# Defines acceptable licenses, banned crates, and vulnerability advisories

[advisories]
# The lint level for security vulnerabilities
vulnerability = "deny"
# The lint level for unmaintained crates
unmaintained = "warn"
# The lint level for crates that have been marked as yanked in the registry
yanked = "warn"

[licenses]
# The lint level used when no other predicates are matched
unlicensed = "deny"
# The confidence threshold for detecting a license from license text
confidence-threshold = 0.8
# Lint level for licenses considered copyleft
copyleft = "warn"
# Blanket approval or denial for OSI-approved or FSF Free/Libre licenses
allow-osi-fsf-free = "both"
# Lint level used when no other predicates are matched
default = "deny"
# The confidence threshold for detecting a license from license text
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 OR MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "MPL-2.0",
]

[bans]
# Lint level for when multiple versions of the same crate appear in the tree
multiple-versions = "warn"
# Lint level used when no other predicates are matched
default = "deny"
# A list of explicitly disallowed duplicate crates
deny = []
# A list of crates that should be skipped when doing duplicate detection
skip = []

[sources]
# Lint level for what to happen when a crate from a crate registry that is not in the allow list is detected
unknown-registry = "warn"
# Lint level for what to happen when a crate from a git repository that is not in the allow list is detected
unknown-git = "warn"
# A list of allowed crate registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# A list of allowed Git repositories
allow-git = []
